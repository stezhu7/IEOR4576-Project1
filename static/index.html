<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>GitTutor Bot</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #238636;
      --accent-hover: #2ea043;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      display: flex;
      justify-content: center;
      padding: 50px 20px;
    }

    .container {
      width: 900px;
    }

    h2 {
      margin: 0 0 10px 0;
      font-weight: 600;
    }

    .tag {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 25px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 100px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 12px;
      resize: vertical;
      font-family: inherit;
      font-size: 14px;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      margin-top: 12px;
      background: var(--accent);
      border: 1px solid var(--accent);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
    }

    button:hover {
      background: var(--accent-hover);
    }

    h3 {
      margin-top: 0;
      font-weight: 600;
    }

    pre {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 6px;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.5;
      min-height: 120px;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>GitTutor Bot</h2>
    <div class="tag">
      Scope: Git CLI commands, workflows, and Git error troubleshooting.
    </div>

    <div class="card">
      <textarea id="q" placeholder="Explain: git rebase -i HEAD~3"></textarea>
      <button onclick="send()">Ask</button>
    </div>

    <div class="card">
      <h3>Answer</h3>
      <pre id="a">Your answer will appear here...</pre>
    </div>

    <div class="footer">
      Built for Git learners · Dark Theme UI
    </div>
  </div>

  <script>
    async function send() {
      const text = document.getElementById("q").value.trim();
      if (!text) return;

      const answerBox = document.getElementById("a");
      answerBox.textContent = "Thinking...";

      try {
        const r = await fetch("/chat", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({text})
        });

        const j = await r.json();
        answerBox.textContent =
          j.answer + (j.backstop ? `\n\n[backstop=${j.backstop}]` : "");

      } catch (err) {
        answerBox.textContent = "Error connecting to server.";
      }
    }
  </script>
</body>
</html>
